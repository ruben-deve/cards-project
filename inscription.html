<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Ma collection de cartes</title>

    <!-- lien vers la feuille de style -->
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <!--en-tête du site : logo -->
    <header>
        <div class="logo"></div>
    </header>

    <!-- contenu principal de la page : formulaire de connexion -->
    <main>

        <section class="inscription">
            <h1>Créer un compte</h1>

            <form action="" method="post">

                <div class="champ">
                    <label for="pseudo">Pseudo</label>
                    <input type="text" id="pseudo" name="pseudo" required>
                </div>

                <div class="champ">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="champ">
                    <label for="mdp">Mot de passe</label>
                    <input type="password" id="mdp" name="mdp" required>
                </div>

                <div class="champ">
                    <label for="mdp-confirm">Confirmer le mot de passe</label>
                    <input type="password" id="mdp-confirm" name="mdp" required>
                </div>

                <button type="submit">S'inscrire</button>

            </form>

            <p>Déjà un compte ? <a href="co.html">Connectez-vous ici</a></p>
        </section>
        
    </main>

    <!-- pied de page -->
    <footer>
        <p>&copy; 2026 - Projet d'axe Coding; Digital Innovation</p>
    </footer>

</body>

</html>
